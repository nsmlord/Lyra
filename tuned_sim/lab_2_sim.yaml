# lab_2_sim.yaml
# Used by the simulation launch only.
# Removes forward_kp_controller and forward_kd_controller since the fake
# plant in pupper_art_sim.py handles servo dynamics directly — no
# ros2_control hardware interface is instantiated.

controller_manager:
  ros__parameters:
    update_rate: 200   # Hz — matches PupperArtSim.CTRL_FREQ

    forward_command_controller:
      type: forward_command_controller/ForwardCommandController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

forward_command_controller:
  ros__parameters:
    joints:
      - leg_front_r_1
      - leg_front_r_2
      - leg_front_r_3
      - leg_front_l_1
      - leg_front_l_2
      - leg_front_l_3
      - leg_back_r_1
      - leg_back_r_2
      - leg_back_r_3
      - leg_back_l_1
      - leg_back_l_2
      - leg_back_l_3
    interface_name: position

joint_state_broadcaster:
  ros__parameters:
    joints:
      - leg_front_r_1
      - leg_front_r_2
      - leg_front_r_3
      - leg_front_l_1
      - leg_front_l_2
      - leg_front_l_3
      - leg_back_r_1
      - leg_back_r_2
      - leg_back_r_3
      - leg_back_l_1
      - leg_back_l_2
      - leg_back_l_3
    interface_name: position

imu_sensor_broadcaster:
  ros__parameters:
    frame_id: base_link
    sensor_name: imu_sensor
